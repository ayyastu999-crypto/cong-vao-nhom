<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cổng vào nhóm - SANSAN GROUP</title>
<style>
  :root { --xanh:#0088cc; --nen:#f4f6f9; --chu:#1c2733; --xam:#7a8aa0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,"Segoe UI",Roboto,sans-serif; background:var(--nen);
         color:var(--chu); padding:16px; max-width:820px; margin:0 auto; }
  header { text-align:center; padding:24px 0 12px; }
  header h1 { font-size:22px; }
  header p { color:var(--xam); font-size:14px; margin-top:6px; }
  .timkiem { width:100%; padding:12px 16px; font-size:16px; border:1px solid #d8e0ea;
             border-radius:12px; margin:16px 0; outline:none; }
  .timkiem:focus { border-color:var(--xanh); }
  .khoi { margin-top:26px; }
  .khoi > h2 { font-size:16px; color:#fff; background:var(--xanh); display:inline-block;
               padding:6px 14px; border-radius:8px; letter-spacing:.5px; }
  .muc { margin-top:14px; }
  .muc > h3 { font-size:13px; color:var(--xam); text-transform:uppercase;
              letter-spacing:.5px; margin:0 0 8px 4px; border-left:3px solid var(--xanh);
              padding-left:8px; }
  .luoi { display:grid; grid-template-columns:1fr; gap:8px; }
  @media(min-width:560px){ .luoi { grid-template-columns:1fr 1fr; } }
  a.nhom { display:flex; align-items:center; gap:10px; background:#fff; padding:13px 15px;
           border-radius:12px; text-decoration:none; color:var(--chu); font-size:14.5px;
           border:1px solid #e6ecf3; transition:.15s; }
  a.nhom:hover { border-color:var(--xanh); transform:translateY(-1px);
                 box-shadow:0 4px 14px rgba(0,136,204,.12); }
  a.nhom .icon { width:32px; height:32px; flex:0 0 32px; border-radius:50%;
                 background:var(--xanh); color:#fff; display:flex; align-items:center;
                 justify-content:center; font-size:15px; }
  a.nhom.chua { opacity:.4; pointer-events:none; }
  footer { text-align:center; color:var(--xam); font-size:12px; padding:28px 0 12px; }
  .empty { text-align:center; color:var(--xam); padding:20px; display:none; }
</style>
</head>
<body>
  <header>
    <h1>🔗 Cổng vào nhóm SANSAN GROUP</h1>
    <p>Tìm phòng ban của bạn → bấm vào nhóm để tham gia</p>
  </header>

  <input class="timkiem" id="tim" placeholder="🔍 Tìm nhóm...">
  <div id="ds"></div>
  <div class="empty" id="trong">Không tìm thấy nhóm phù hợp.</div>

  <footer>SANSAN GROUP • Cổng tham gia nhóm nội bộ</footer>

function render(loc="") {
  const box = document.getElementById('ds');
  box.innerHTML = "";
  const lower = loc.toLowerCase();
  const loc_ds = NHOM.filter(n => n.ten.toLowerCase().includes(lower));
  const khois = [...new Set(loc_ds.map(n => n.khoi))];
  let co = false;

  khois.forEach(k => {
    const dsK = loc_ds.filter(n => n.khoi === k);
    if (!dsK.length) return;
    co = true;
    const divK = document.createElement('div');
    divK.className = 'khoi';
    let html = `<h2>${k}</h2>`;
    const mucs = [...new Set(dsK.map(n => n.muc))];
    mucs.forEach(m => {
      const dsM = dsK.filter(n => n.muc === m);
      html += `<div class="muc">`;
      if (m) html += `<h3>${m}</h3>`;
      html += `<div class="luoi">` + dsM.map(n =>
        `<a class="nhom ${n.link==='#'?'chua':''}" href="${n.link}" target="_blank">
           <span class="icon">${n.link==='#'?'⏳':'➜'}</span><span>${n.ten}</span></a>`
      ).join('') + `</div></div>`;
    });
    divK.innerHTML = html;
    box.appendChild(divK);
  });
  document.getElementById('trong').style.display = co ? 'none' : 'block';
}
render();
document.getElementById('tim').addEventListener('input', e => render(e.target.value));
</script>

</html>
