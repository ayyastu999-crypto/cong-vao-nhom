<title>SANSAN GROUP — Cổng tham gia nhóm</title>
<style>
  :root{--xanh:#229ED9;--nen:#eef2f7;--card:#fff;--chu:#1b2536;--xam:#8794a8;--vien:#e8edf4}
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--nen);color:var(--chu)}

  @keyframes gradientMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  @keyframes floatUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  @keyframes blob{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(24px,-20px) scale(1.18)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  @keyframes pop{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}

  .hero{position:relative;overflow:hidden;color:#fff;text-align:center;padding:60px 20px 116px;
        background:linear-gradient(135deg,#229ED9 0%,#1c7fc4 38%,#5b6df0 72%,#7a4ff0 100%);
        background-size:300% 300%;animation:gradientMove 14s ease infinite}
  .hero::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:70px;background:var(--nen);border-radius:50% 50% 0 0/100% 100% 0 0}
  .hero .blob{position:absolute;border-radius:50%;filter:blur(46px);opacity:.5;z-index:0}
  .hero .blob.b1{width:210px;height:210px;background:#7af0e0;top:-40px;left:-30px;animation:blob 9s ease-in-out infinite}
  .hero .blob.b2{width:250px;height:250px;background:#c4b5fd;bottom:-50px;right:-40px;animation:blob 11s ease-in-out infinite reverse}
  .hero .logo,.hero h1,.hero .sub,.hero .stats{position:relative;z-index:2;animation:floatUp .8s both}
  .hero h1{animation-delay:.12s}.hero .sub{animation-delay:.24s}.hero .stats{animation-delay:.36s}
  .hero .logo{width:74px;height:74px;border-radius:22px;background:rgba(255,255,255,.16);display:flex;
        align-items:center;justify-content:center;font-size:38px;margin:0 auto 18px;border:1px solid rgba(255,255,255,.25);
        animation:floatUp .8s both, floaty 4s ease-in-out 1s infinite}
  .hero h1{font-size:32px;font-weight:800;letter-spacing:-.5px}
  .hero .sub{font-size:15.5px;opacity:.92;margin:12px auto 0;max-width:520px}
  .stats{display:flex;gap:12px;justify-content:center;margin-top:24px;flex-wrap:wrap}
  .stat{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);border-radius:14px;padding:10px 18px}
  .stat b{font-size:20px;display:block;font-weight:800}
  .stat span{font-size:11px;opacity:.85;text-transform:uppercase;letter-spacing:.5px}

  .wrap{max-width:760px;margin:-44px auto 0;padding:0 16px 50px;position:relative;z-index:3}
  .timkiem{width:100%;padding:16px 18px;font-size:16px;border:1px solid var(--vien);border-radius:16px;
        outline:none;background:#fff;box-shadow:0 10px 30px rgba(20,40,80,.08)}
  .timkiem:focus{border-color:var(--xanh)}

  .khoi{margin-top:32px}
  .khoi-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .khoi-head .badge{font-size:14.5px;font-weight:700;color:#fff;background:var(--xanh);padding:7px 16px;border-radius:30px}
  .khoi-head .dem{font-size:12px;color:var(--xam)}
  .muc{margin-top:14px}
  .muc h3{font-size:12.5px;color:var(--xam);text-transform:uppercase;letter-spacing:.6px;margin:0 0 8px 2px;font-weight:700}
  .luoi{display:grid;grid-template-columns:1fr;gap:10px}
  @media(min-width:600px){.luoi{grid-template-columns:1fr 1fr}}

  .card{display:flex;align-items:center;gap:12px;background:var(--card);padding:14px 16px;border-radius:16px;
        border:1px solid var(--vien);cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s;animation:fadeUp .5s both}
  .card:hover{border-color:var(--xanh);transform:translateY(-2px);box-shadow:0 12px 26px rgba(34,158,217,.16)}
  .card .ic{width:38px;height:38px;flex:0 0 38px;border-radius:12px;background:linear-gradient(135deg,#229ED9,#5b6df0);
        color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;transition:transform .18s}
  .card:hover .ic{transform:scale(1.12) rotate(-6deg)}
  .card .ten{flex:1;line-height:1.25;font-size:14.5px;font-weight:600}
  .card .cnt{font-size:12px;color:var(--xam);background:#eef4fb;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .card .chev{color:var(--xanh);font-weight:700}

  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(15,25,45,.5);backdrop-filter:blur(3px);
        display:none;align-items:flex-end;justify-content:center;z-index:50;padding:0}
  .overlay.open{display:flex}
  @media(min-width:560px){.overlay{align-items:center;padding:20px}}
  .modal{background:#fff;width:100%;max-width:460px;border-radius:22px 22px 0 0;animation:pop .28s ease;
        max-height:88vh;display:flex;flex-direction:column;overflow:hidden}
  @media(min-width:560px){.modal{border-radius:22px}}
  .modal .mhead{padding:20px 20px 14px;border-bottom:1px solid var(--vien);display:flex;align-items:flex-start;gap:12px}
  .modal .mhead .ic{width:44px;height:44px;flex:0 0 44px;border-radius:13px;background:linear-gradient(135deg,#229ED9,#5b6df0);
        color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px}
  .modal .mhead .ti{flex:1}
  .modal .mhead .ti b{font-size:16.5px;line-height:1.3;display:block}
  .modal .mhead .ti span{font-size:12.5px;color:var(--xam)}
  .modal .x{border:none;background:#f0f3f7;width:32px;height:32px;border-radius:50%;font-size:17px;cursor:pointer;color:#5b6b80;flex:0 0 32px}
  .modal .mbody{padding:8px 12px;overflow-y:auto;flex:1}
  .mrow{display:flex;justify-content:space-between;gap:12px;padding:11px 12px;border-radius:12px}
  .mrow:nth-child(odd){background:#f7f9fc}
  .mrow .nm{font-size:14px;font-weight:500}
  .mrow .ph{font-size:13px;color:var(--xam);font-variant-numeric:tabular-nums;white-space:nowrap}
  .mrow.hl{background:#fff3cd}
  .mempty{text-align:center;color:var(--xam);padding:22px;font-size:14px}
  .modal .mfoot{padding:14px 16px calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--vien)}
  .mfoot a{display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,#229ED9,#3b82f6);
        color:#fff;text-decoration:none;font-weight:700;font-size:16px;padding:15px;border-radius:14px;transition:.15s}
  .mfoot a:hover{filter:brightness(1.06);transform:translateY(-1px)}

  .chua{margin-top:34px;background:#fff4e8;border:1px solid #ffd9b0;border-radius:16px;padding:16px}
  .chua h3{font-size:14px;color:#b35a00;margin-bottom:8px}
  .chua .crow{display:flex;justify-content:space-between;gap:12px;padding:6px 2px;font-size:13.5px}
  .chua .crow .ph{color:#b08968;white-space:nowrap}
  .empty{text-align:center;color:var(--xam);padding:30px;display:none}
  footer{text-align:center;color:var(--xam);font-size:12.5px;padding:30px 16px 40px}
</style>

let curQ = "";
function esc(s){return s.replace(/"/g,'&quot;')}
function khop(n,q){
  if(!q) return true;
  if(n.ten.toLowerCase().includes(q)) return true;
  return (MEM[n.ten]||[]).some(m=>m[0].toLowerCase().includes(q));
}

function render(loc=""){
  curQ=loc.trim().toLowerCase();
  const box=document.getElementById('ds');box.innerHTML="";
  const ds=NHOM.filter(n=>khop(n,curQ));

    const dsK=ds.filter(n=>n.khoi===k);if(!dsK.length)return;co=true;

    let html=`<div class="khoi-head"><span class="badge">${k}</span><span class="dem">${dsK.length} nhóm</span></div>`;
    const mucs=[...new Set(dsK.map(n=>n.muc))];
    mucs.forEach(m=>{
      const dsM=dsK.filter(n=>n.muc===m);
      html+=`<div class="muc">`+(m?`<h3>${m}</h3>`:``)+`<div class="luoi">`+dsM.map((n,idx)=>{
        const sl=(MEM[n.ten]||[]).length;
        const cnt=sl?`<span class="cnt">👥 ${sl}</span>`:``;
        return `<div class="card" data-ten="${esc(n.ten)}" style="animation-delay:${(idx%12)*0.05}s">
           <span class="ic">✈️</span><span class="ten">${n.ten}</span>${cnt}<span class="chev">›</span></div>`;
      }).join('')+`</div></div>`;
    });
    div.innerHTML=html;box.appendChild(div);
  });
  document.getElementById('trong').style.display=co?'none':'block';

  const cFilter=CHUA.filter(c=>!curQ||c[0].toLowerCase().includes(curQ));
  document.getElementById('chuabox').innerHTML = cFilter.length
    ? `<div class="chua"><h3>⚠️ Chưa rõ nhóm — cần phân công</h3>`+
      cFilter.map(c=>`<div class="crow"><span>👤 ${c[0]} <small style="color:#b08968">(${c[2]})</small></span><span class="ph">${c[1]}</span></div>`).join('')+`</div>`
    : "";
}

// ===== MODAL =====
function openModal(ten){
  const n=NHOM.find(x=>x.ten===ten);if(!n)return;
  const ms=MEM[ten]||[];
  document.getElementById('mdTen').textContent=ten;
  document.getElementById('mdSub').textContent=ms.length?`${ms.length} thành viên`:'Chưa có thành viên trong danh sách';
  document.getElementById('mdJoin').href=n.link;
  document.getElementById('mdBody').innerHTML = ms.length
    ? ms.map(m=>{
        const hl=curQ&&m[0].toLowerCase().includes(curQ)?' hl':'';
        return `<div class="mrow${hl}"><span class="nm">👤 ${m[0]}</span><span class="ph">${m[1]}</span></div>`;
      }).join('')
    : `<div class="mempty">Nhóm này chưa có thành viên trong danh sách.<br>Bạn vẫn có thể bấm <b>Tham gia</b> bên dưới.</div>`;
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open')}

document.getElementById('ds').addEventListener('click',e=>{
  const c=e.target.closest('.card');if(c) openModal(c.getAttribute('data-ten'));
});
document.getElementById('mdClose').addEventListener('click',closeModal);
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
document.getElementById('tim').addEventListener('input',e=>render(e.target.value));
render();
</script>
</body>
</html>
