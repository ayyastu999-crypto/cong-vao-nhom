<style>
  :root{
    --xanh:#229ED9; --xanh2:#0f6db5; --tim:#5b6df0;
    --nen:#0b1220; --card:#ffffff; --chu:#1b2536; --xam:#8794a8;
    --vien:#e8edf4;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:#eef2f7;color:var(--chu)}

  /* ===== HERO ===== */
  .hero{position:relative;overflow:hidden;color:#fff;text-align:center;
        padding:64px 20px 120px;
        background:linear-gradient(135deg,#229ED9 0%,#1c7fc4 45%,#5b6df0 100%)}
  .hero::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:80px;
        background:#eef2f7;border-radius:50% 50% 0 0/100% 100% 0 0}
  .hero .logo{width:74px;height:74px;border-radius:22px;background:rgba(255,255,255,.16);
        display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 18px;
        backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.25)}
  .hero h1{font-size:34px;font-weight:800;letter-spacing:-.5px;line-height:1.15}
  .hero .sub{font-size:16px;opacity:.92;margin-top:12px;max-width:520px;margin-left:auto;margin-right:auto}
  .stats{display:flex;gap:14px;justify-content:center;margin-top:26px;flex-wrap:wrap;position:relative;z-index:2}
  .stat{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);
        border-radius:14px;padding:12px 20px;backdrop-filter:blur(4px)}
  .stat b{font-size:22px;display:block;font-weight:800}
  .stat span{font-size:12px;opacity:.85;text-transform:uppercase;letter-spacing:.5px}

  /* ===== BODY ===== */
  .wrap{max-width:860px;margin:-46px auto 0;padding:0 16px 50px;position:relative;z-index:3}
  .timkiem{width:100%;padding:16px 18px;font-size:16px;border:1px solid var(--vien);
        border-radius:16px;outline:none;background:#fff;box-shadow:0 10px 30px rgba(20,40,80,.08)}
  .timkiem:focus{border-color:var(--xanh)}

  .khoi{margin-top:34px}
  .khoi-head{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .khoi-head .badge{font-size:15px;font-weight:700;color:#fff;background:var(--xanh);
        padding:7px 16px;border-radius:30px}
  .khoi-head .dem{font-size:12px;color:var(--xam)}

  .muc{margin-top:16px}
  .muc h3{font-size:12.5px;color:var(--xam);text-transform:uppercase;letter-spacing:.6px;
        margin:0 0 10px 2px;font-weight:700}
  .luoi{display:grid;grid-template-columns:1fr;gap:10px}
  @media(min-width:600px){.luoi{grid-template-columns:1fr 1fr}}

  a.nhom{display:flex;align-items:center;gap:12px;background:var(--card);padding:15px 16px;
        border-radius:16px;text-decoration:none;color:var(--chu);font-size:14.5px;font-weight:500;
        border:1px solid var(--vien);transition:.18s;position:relative}
  a.nhom:hover{border-color:var(--xanh);transform:translateY(-2px);
        box-shadow:0 12px 26px rgba(34,158,217,.16)}
  a.nhom .ic{width:38px;height:38px;flex:0 0 38px;border-radius:12px;
        background:linear-gradient(135deg,#229ED9,#5b6df0);color:#fff;display:flex;
        align-items:center;justify-content:center;font-size:18px}
  a.nhom .ten{flex:1;line-height:1.25}
  a.nhom .go{font-size:12px;color:var(--xanh);font-weight:700;opacity:0;transition:.18s}
  a.nhom:hover .go{opacity:1}
  a.nhom.chua{opacity:.45;pointer-events:none}
  a.nhom.chua .ic{background:#c2ccdb}

  .empty{text-align:center;color:var(--xam);padding:30px;display:none}
  footer{text-align:center;color:var(--xam);font-size:12.5px;padding:30px 16px 40px}
  footer b{color:var(--chu)}
</style>

function render(loc=""){
  const box=document.getElementById('ds');box.innerHTML="";
  const lower=loc.toLowerCase();
  const ds=NHOM.filter(n=>n.ten.toLowerCase().includes(lower));
  const khois=[...new Set(ds.map(n=>n.khoi))];
  let co=false;
  khois.forEach(k=>{
    const dsK=ds.filter(n=>n.khoi===k);if(!dsK.length)return;co=true;
    const div=document.createElement('div');div.className='khoi';
    let html=`<div class="khoi-head"><span class="badge">${k}</span><span class="dem">${dsK.length} nhóm</span></div>`;
    const mucs=[...new Set(dsK.map(n=>n.muc))];
    mucs.forEach(m=>{
      const dsM=dsK.filter(n=>n.muc===m);
      html+=`<div class="muc">`+(m?`<h3>${m}</h3>`:``)+`<div class="luoi">`+dsM.map(n=>
        `<a class="nhom ${n.link==='#'?'chua':''}" href="${n.link}" target="_blank">
           <span class="ic">${n.link==='#'?'⏳':'✈️'}</span>
           <span class="ten">${n.ten}</span>
           <span class="go">Tham gia ➜</span></a>`
      ).join('')+`</div></div>`;
    });
    div.innerHTML=html;box.appendChild(div);
  });
  document.getElementById('trong').style.display=co?'none':'block';
}
render();
document.getElementById('tim').addEventListener('input',e=>render(e.target.value));
