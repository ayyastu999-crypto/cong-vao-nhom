<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SANSAN GROUP — Cổng tham gia nhóm</title>
<style>
  :root{--xanh:#229ED9;--nen:#eef2f7;--card:#fff;--chu:#1b2536;--xam:#8794a8;--vien:#e8edf4}
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  html{scroll-behavior:smooth}
  body{background:var(--nen);color:var(--chu)}
  @keyframes gradientMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  @keyframes floatUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  @keyframes blob{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(24px,-20px) scale(1.18)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

  .hero{position:relative;overflow:hidden;color:#fff;text-align:center;padding:60px 20px 116px;
        background:linear-gradient(135deg,#229ED9 0%,#1c7fc4 38%,#3b82f6 72%,#2563eb 100%);
        background-size:300% 300%;animation:gradientMove 14s ease infinite}
  .hero::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:70px;background:var(--nen);border-radius:50% 50% 0 0/100% 100% 0 0}
  .hero .blob{position:absolute;border-radius:50%;filter:blur(46px);opacity:.5;z-index:0}
  .hero .blob.b1{width:210px;height:210px;background:#7af0e0;top:-40px;left:-30px;animation:blob 9s ease-in-out infinite}
  .hero .blob.b2{width:250px;height:250px;background:#93c5fd;bottom:-50px;right:-40px;animation:blob 11s ease-in-out infinite reverse}
  .hero .logo,.hero h1,.hero .sub,.hero .stats{position:relative;z-index:2;animation:floatUp .8s both}
  .hero h1{animation-delay:.12s}.hero .sub{animation-delay:.24s}.hero .stats{animation-delay:.36s}
  .hero .logo{width:74px;height:74px;border-radius:22px;background:rgba(255,255,255,.16);display:flex;
        align-items:center;justify-content:center;font-size:38px;margin:0 auto 18px;border:1px solid rgba(255,255,255,.25);
        animation:floatUp .8s both, floaty 4s ease-in-out 1s infinite}
  .hero h1{font-size:32px;font-weight:800;letter-spacing:-.5px}
  .hero .sub{font-size:15.5px;opacity:.92;margin:12px auto 0;max-width:520px}
  .stats{display:flex;gap:12px;justify-content:center;margin-top:24px;flex-wrap:wrap}
  .stat{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);border-radius:10px;padding:10px 18px}
  .stat b{font-size:20px;display:block;font-weight:800}
  .stat span{font-size:11px;opacity:.85;text-transform:uppercase;letter-spacing:.5px}

  .wrap{max-width:820px;margin:-44px auto 0;padding:0 16px 50px;position:relative;z-index:3}
  .timkiem{width:100%;padding:16px 18px;font-size:16px;border:1px solid var(--vien);border-radius:11px;
        outline:none;background:#fff;box-shadow:0 10px 30px rgba(20,40,80,.08)}
  .timkiem:focus{border-color:var(--xanh)}
  .khoi{margin-top:32px}
  .khoi-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .khoi-head .badge{font-size:14.5px;font-weight:700;color:#fff;background:var(--xanh);padding:7px 16px;border-radius:30px}
  .khoi-head .dem{font-size:12px;color:var(--xam)}
  .muc{margin-top:14px}
  .muc h3{font-size:12.5px;color:var(--xam);text-transform:uppercase;letter-spacing:.6px;margin:0 0 8px 2px;font-weight:700}
  .luoi{display:grid;grid-template-columns:1fr;gap:10px}
  @media(min-width:600px){.luoi{grid-template-columns:1fr 1fr}}
  a.nhom{display:flex;align-items:center;gap:13px;background:var(--card);padding:14px 16px;border-radius:10px;
        text-decoration:none;color:var(--chu);border:1px solid var(--vien);transition:transform .18s,box-shadow .18s,border-color .18s;animation:fadeUp .5s both}
  a.nhom:hover{border-color:var(--xanh);transform:translateY(-2px);box-shadow:0 12px 26px rgba(34,158,217,.16)}
  a.nhom .ic{width:44px;height:44px;flex:0 0 44px;border-radius:9px;background:#eef5fb;display:flex;align-items:center;justify-content:center;font-size:22px;transition:transform .18s}
  a.nhom:hover .ic{transform:scale(1.1) rotate(-5deg)}
  a.nhom .ten{flex:1;line-height:1.3;font-size:14.5px;font-weight:600}
  a.nhom .go{font-size:12px;color:var(--xanh);font-weight:700;white-space:nowrap;opacity:0;transition:.18s}
  a.nhom:hover .go{opacity:1}
  .empty{text-align:center;color:var(--xam);padding:30px;display:none}
  footer{text-align:center;color:var(--xam);font-size:12.5px;padding:30px 16px 40px}
</style>

// icon liên quan tới từng nhóm (theo từ khoá)
function iconFor(n){
  n=n.toLowerCase();
  if(n.includes('ck ')||n.includes('chuyển khoản'))return'💳';
  if(n.includes('quảng cáo')||n.includes('ads'))return'📊';
  if(n.includes('marketing'))return'📣';
  if(n.includes('make up')||n.includes('makeup'))return'💄';
  if(n.includes('lễ tân'))return'🛎️';
  if(n.includes('wedding'))return'💍';
  if(n.includes('sankid'))return'🧒';
  if(n.includes('kỷ yếu'))return'🎓';
  if(n.includes('stylist')||n.includes('nhiếp'))return'📸';
  if(n.includes('pts'))return'🖌️';
  if(n.includes('media'))return'🎬';
  if(n.includes('hcns'))return'🧑‍💼';
  if(n.includes('điều phối')||n.includes('quản lý')||n.includes('trợ lý'))return'🗂️';
  if(n.includes('thực tập'))return'🌱';
  if(n.includes('edit video')||n.includes('biên tập')||n.includes('tiktok'))return'🎞️';
  if(n.includes('ý tưởng')||n.includes('concept'))return'💡';
  if(n.includes('báo cáo')||n.includes('checklist')||n.includes('phiếu')||n.includes('đánh giá'))return'📋';
  if(n.includes('nguyên liệu'))return'📦';
  if(n.includes('it -')||n.includes('it-'))return'💻';
  if(n.includes('noti')||n.includes('form'))return'🔔';
  if(n.includes('kho'))return'🏬';
  if(n.includes('thông báo'))return'📢';
  if(n.includes('kế toán')||n.includes('thu academy')||n.includes('thu chi'))return'💰';
  if(n.includes('chi academy'))return'📤';
  if(n.includes('sanjoli'))return'🛍️';
  if(n.includes('sale'))return'🛒';
  if(n.includes('công việc'))return'🗒️';
  if(n.includes('academy'))return'🎓';
  return'💬';
}

function render(loc=""){
  const box=document.getElementById('ds');box.innerHTML="";
  const q=loc.toLowerCase();
  const ds=NHOM.filter(n=>n.ten.toLowerCase().includes(q));
  const khois=[...new Set(ds.map(n=>n.khoi))];
  let co=false;
  khois.forEach(k=>{
    const dsK=ds.filter(n=>n.khoi===k);if(!dsK.length)return;co=true;
    const div=document.createElement('div');div.className='khoi';
    let html=`<div class="khoi-head"><span class="badge">${k}</span><span class="dem">${dsK.length} nhóm</span></div>`;
    const mucs=[...new Set(dsK.map(n=>n.muc))];
    mucs.forEach(m=>{
      const dsM=dsK.filter(n=>n.muc===m);
      html+=`<div class="muc">`+(m?`<h3>${m}</h3>`:``)+`<div class="luoi">`+dsM.map((n,idx)=>
        `<a class="nhom" href="${n.link}" target="_blank" style="animation-delay:${(idx%12)*0.05}s">
           <span class="ic">${iconFor(n.ten)}</span><span class="ten">${n.ten}</span><span class="go">Tham gia ➜</span></a>`
      ).join('')+`</div></div>`;
    });
    div.innerHTML=html;box.appendChild(div);
  });
  document.getElementById('trong').style.display=co?'none':'block';
}
render();
document.getElementById('tim').addEventListener('input',e=>render(e.target.value));
